name: Publish Knowledge Artifact

on:
  release:
    types: [created]

permissions:
  contents: write   # attach release asset
  packages: write   # push to GitHub Packages

jobs:
  publish-knowledge:
    name: Build and Publish Knowledge Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: knowledge/requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Cache Ollama models
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.ollama/models
          key: ${{ runner.os }}-ollama-nomic-embed-text-v1.5
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Start Ollama server
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/version >/dev/null; then
              echo "Ollama ready"
              exit 0
            fi
            sleep 1
          done
          echo "Ollama did not become ready"
          tail -50 /tmp/ollama.log
          exit 1

      - name: Pull embedding model
        run: ollama pull nomic-embed-text:v1.5

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build knowledge artifact
        env:
          OLLAMA_HOST: http://localhost:11434
          MPE_OLLAMA_MODEL: nomic-embed-text:v1.5
        run: VERSION=${{ steps.version.outputs.version }} make knowledge-build

      - name: Set up Java
        uses: actions/setup-java@v4 # pin SHA when available
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy knowledge artifact to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Skip deploy if artifact already exists (idempotent re-runs)
          if curl -sf -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://maven.pkg.github.com/manetu/policyengine/com/manetu/mpe-knowledge/${VERSION}/mpe-knowledge-${VERSION}.jar" \
            -o /dev/null; then
            echo "Artifact ${VERSION} already exists in GitHub Packages, skipping deploy"
          else
            VERSION=${VERSION} make knowledge-deploy
          fi

      - name: Attach JAR to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: knowledge/target/mpe-knowledge-${{ steps.version.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
