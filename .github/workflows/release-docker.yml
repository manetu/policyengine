name: Release Docker Images

on:
  release:
    types: [created]

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Generate NOTICES and copy license files to kodata
        run: |
          ./scripts/generate-notices.sh
          mkdir -p cmd/mpe/kodata
          cp NOTICES cmd/mpe/kodata/
          cp LICENSE cmd/mpe/kodata/

      - name: Build and publish Docker image
        env:
          KO_DOCKER_REPO: ghcr.io/manetu/policyengine
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_PKG=github.com/manetu/policyengine/cmd/mpe/version
          export GOFLAGS="-ldflags=-X=${VERSION_PKG}.Version=${VERSION}"
          ko build --platform=linux/amd64,linux/arm64 \
            --base-import-paths \
            --tags=${VERSION},latest \
            --push \
            github.com/manetu/policyengine/cmd/mpe



